<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scanner SUNAT + Manual</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 16px; background:#f4f4f9; }
        .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; font-size: 1.2rem; color: #333; }
        
        /* Botones */
        .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; margin-bottom: 8px; }
        .btn-primary { background: #000; color: #fff; }
        .btn-blue { background: #0066ff; color: #fff; }
        .btn-stop { background: #ffebee; color: #b71c1c; }
        
        #reader { width: 100%; border-radius: 8px; overflow: hidden; background: #000; }
        
        /* Status Pill */
        .status { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; background: #eee; color: #666; margin-bottom: 10px; }
        .status.ok { background: #e8f5e9; color: #2e7d32; }
        .status.err { background: #ffebee; color: #c62828; }
        .status.busy { background: #e3f2fd; color: #1565c0; }

        pre { white-space: pre-wrap; word-break: break-word; background: #fafafa; padding: 10px; border-radius: 6px; font-size: 0.8rem; color: #444; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { border: 1px solid #eee; padding: 6px; text-align: left; }
        th { background: #f9f9f9; }

        /* Loading Overlay */
        .overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; visibility: hidden; opacity: 0; transition: 0.2s; }
        .overlay.active { visibility: visible; opacity: 1; }
        .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: #0066ff; border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <h2>📷 Escáner Guías</h2>
        <div id="status" class="status">Listo</div>
        
        <div id="reader"></div>
        
        <div style="margin-top: 12px; display: flex; gap: 8px;">
            <button id="btnScan" class="btn btn-primary">Escanear QR</button>
            <button id="btnStop" class="btn btn-stop" style="display:none">Detener</button>
        </div>

        <div style="margin-top: 16px; border-top: 1px solid #eee; padding-top: 16px;">
            <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none" />
            <button id="btnManual" class="btn btn-blue">📸 Foto Manual (OCR)</button>
            <small style="color:#666; display:block; text-align:center;">Usa esto si el QR no funciona</small>
        </div>
    </div>

    <div class="card">
        <h2>Resultados</h2>
        <div id="output">No hay datos recientes.</div>
    </div>

    <div id="overlay" class="overlay">
        <div class="spinner"></div>
        <p id="loadingMsg" style="margin-top:15px; font-weight:600; color:#333;">Procesando...</p>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        // --- CONFIGURACIÓN ---
        // TU URL ACTUALIZADA:
        let APP_URL = "https://script.google.com/macros/s/AKfycbxvJLP5MGxgv8Zw8RvNtuJV8Wc6gSFNBnU0Ho6u5WaDaKCvYojpnieqmThKO8MRWK5P/exec"; 
        
        const SUNAT_PREFIX = "https://e-factura.sunat.gob.pe";
        
        const ui = {
            status: document.getElementById("status"),
            btnScan: document.getElementById("btnScan"),
            btnStop: document.getElementById("btnStop"),
            btnManual: document.getElementById("btnManual"),
            fileInput: document.getElementById("fileInput"),
            output: document.getElementById("output"),
            overlay: document.getElementById("overlay"),
            msg: document.getElementById("loadingMsg")
        };

        let scanner = null;

        function setStatus(msg, type="") {
            ui.status.textContent = msg;
            ui.status.className = "status " + type;
        }

        function toggleBusy(isBusy, text="Cargando...") {
            ui.msg.textContent = text;
            ui.overlay.classList.toggle("active", isBusy);
        }

        // --- 1. QR SCANNER LOGIC ---
        ui.btnScan.addEventListener("click", () => {
            if(!scanner) scanner = new Html5Qrcode("reader");
            ui.btnScan.style.display = "none";
            ui.btnStop.style.display = "block";
            
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                (decodedText) => {
                    handleQrDetected(decodedText);
                },
                (err) => {}
            ).catch(err => {
                setStatus("Error cámara: " + err, "err");
                stopScanner();
            });
        });

        ui.btnStop.addEventListener("click", stopScanner);

        function stopScanner() {
            if(scanner) {
                scanner.stop().then(() => scanner.clear()).catch(console.error);
            }
            ui.btnScan.style.display = "block";
            ui.btnStop.style.display = "none";
        }

        async function handleQrDetected(text) {
            stopScanner();
            let cleanUrl = text;
            // Limpieza básica de URL Sunat
            if (text.includes("hashqr=")) {
                const token = text.split("hashqr=")[1];
                cleanUrl = SUNAT_PREFIX + "/v1/contribuyente/gre/comprobantes/descargaqr?hashqr=" + token;
            }

            if(!cleanUrl.includes("sunat.gob.pe")) {
                setStatus("QR leído pero NO es SUNAT", "err");
                ui.output.textContent = text;
                return;
            }

            // PROCESO QR: 1. Descargar PDF (Frontend) -> 2. Extraer Texto -> 3. Enviar a Apps Script
            try {
                toggleBusy(true, "Descargando PDF SUNAT...");
                const blob = await fetch(cleanUrl).then(r => r.blob());
                
                toggleBusy(true, "Leyendo PDF...");
                const pdfText = await extractPdfText(blob);
                
                toggleBusy(true, "Guardando datos...");
                const resp = await sendToBackend({ action: "process_text", text: pdfText, url: cleanUrl });
                
                renderResult(resp);
                setStatus("Guardado OK", "ok");
            } catch (e) {
                setStatus("Error", "err");
                ui.output.textContent = e.message;
            } finally {
                toggleBusy(false);
            }
        }

        // --- 2. MANUAL PHOTO LOGIC ---
        ui.btnManual.addEventListener("click", () => ui.fileInput.click());
        
        ui.fileInput.addEventListener("change", async () => {
            if (ui.fileInput.files.length === 0) return;
            const file = ui.fileInput.files[0];
            
            try {
                toggleBusy(true, "Optimizando imagen...");
                // AQUI ESTA EL TRUCO: 1600px de ancho para que el OCR lea bien
                const base64 = await resizeImage(file, 1600, 0.7); 
                
                toggleBusy(true, "Subiendo y Analizando (OCR)...");
                const resp = await sendToBackend({ 
                    action: "process_image", 
                    image_base64: base64 
                });
                
                renderResult(resp);
                setStatus(resp.ok ? "OCR Exitoso" : "Error OCR", resp.ok ? "ok" : "err");
            } catch (e) {
                setStatus("Error", "err");
                ui.output.textContent = e.message;
            } finally {
                toggleBusy(false);
                ui.fileInput.value = "";
            }
        });

        // --- HELPERS ---
        async function sendToBackend(payload) {
            const resp = await fetch(APP_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            return await resp.json();
        }

        function resizeImage(file, maxWidth, quality) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement("canvas");
                        let w = img.width, h = img.height;
                        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext("2d");
                        ctx.fillStyle = "white"; ctx.fillRect(0,0,w,h);
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL("image/jpeg", quality).split(",")[1]);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function extractPdfText(blob) {
            const buf = await blob.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(buf).promise;
            let full = "";
            for (let i=1; i<=pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                full += content.items.map(item => item.str).join(" ") + "\n";
            }
            return full;
        }

        function renderResult(resp) {
            if (!resp.ok) {
                ui.output.innerHTML = `<b style="color:red">${resp.error}</b>`;
                return;
            }
            const d = resp.data || {};
            const items = d.ITEMS || [];
            
            let html = `<table>
                <tr><th>Guía</th><td>${d.N_SERIE}-${d.N_DOCUMENTO}</td></tr>
                <tr><th>Empresa</th><td>${d.EMPRESA}</td></tr>
                <tr><th>RUC</th><td>${d.RUC}</td></tr>
            </table>`;
            
            if(items.length) {
                html += `<div style="margin-top:10px; font-weight:bold;">Items Detectados:</div>`;
                items.forEach((it, idx) => {
                    let sizes = Object.entries(it.SIZES || {}).map(([k,v]) => `${k}=${v}`).join(", ");
                    html += `<div style="background:#fff; border:1px solid #ddd; padding:8px; margin-top:5px; border-radius:4px;">
                        <b>#${idx+1}</b> ${it.TIPO}<br>
                        Color: ${it.COLOR} | OP: ${it.OP}<br>
                        <small>${sizes || "Sin desglose"}</small>
                    </div>`;
                });
            } else {
                 html += `<p style="color:orange">⚠️ No se detectaron items claros.</p>`;
            }
            
            // Debug texto crudo
            html += `<details style="margin-top:15px"><summary>Ver Texto Raw</summary><pre>${resp.text || resp.fullText || ""}</pre></details>`;
            
            ui.output.innerHTML = html;
        }
    </script>
</body>
</html>
