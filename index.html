<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GRE SUNAT | QR → Drive → bd</title>
  <style>
    body { font-family: system-ui, Arial; margin: 16px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin: 12px 0; }
    #reader { width: min(420px, 100%); margin: 0 auto; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    button, input { padding: 10px 12px; border-radius: 10px; border: 1px solid #ddd; background: #fff; }
    button { cursor: pointer; }
    button.primary { border-color: #111; }
    .muted { color: #666; font-size: 13px; }
    .pill { display:inline-block; padding: 4px 8px; border:1px solid #eee; border-radius: 999px; font-size: 12px; }
    .ok { color: #0a7a2f; font-weight: 700; }
    .err { color: #b00020; font-weight: 700; }
    pre { white-space: pre-wrap; word-break: break-word; margin: 8px 0 0; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border-bottom: 1px solid #eee; padding: 8px; text-align: left; vertical-align: top; }
    th { background: #fafafa; width: 38%; }
    a { word-break: break-word; }
    .small { font-size: 12px; }
  </style>
</head>
<body>
  <h2>GRE SUNAT | Escaneo masivo</h2>
  <p class="muted">
    Abre en Chrome/Safari (no dentro de WhatsApp/Instagram) y permite cámara.
  </p>

  <div class="card">
    <div class="row">
      <button id="btnStart" class="primary">Iniciar cámara trasera</button>
      <button id="btnStop">Detener</button>
      <span id="status" class="pill">Listo</span>
    </div>

    <div style="height:12px"></div>
    <div id="reader"></div>

    <div style="height:12px"></div>
    <div class="muted">O pega el URL (prueba manual):</div>
    <div class="row">
      <input id="urlInput" style="flex:1; min-width: 240px;"
             placeholder="https://e-factura.sunat.gob.pe/...hashqr=..." />
      <button id="btnProcess">Procesar URL</button>
    </div>

    <div class="muted" style="margin-top:10px;">Último URL:</div>
    <pre id="lastUrl"></pre>
  </div>

  <div class="card">
    <b>Último registro</b>
    <div id="out" class="muted">Aún no hay datos.</div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    /************ CONFIG ************/
    const APPS_SCRIPT_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbx6ML2hMbfysWFx16x4K0R60G5bZ_Sfk5o8zeW0jbiXQ5Y2KU9mreJ2dDOwskwVYHGA/exec"; 
    const API_KEY = "";

    const SUNAT_PREFIX =
      "https://e-factura.sunat.gob.pe/v1/contribuyente/gre/comprobantes/descargaqr?hashqr=";

    /************ UI ************/
    const btnStart = document.getElementById("btnStart");
    const btnStop  = document.getElementById("btnStop");
    const btnProcess = document.getElementById("btnProcess");
    const urlInput = document.getElementById("urlInput");

    const statusEl = document.getElementById("status");
    const lastUrlEl = document.getElementById("lastUrl");
    const outEl = document.getElementById("out");

    let html5QrCode = null;
    let busy = false;
    let cooldownUntil = 0;
    const COOLDOWN_MS = 1200;

    function setStatus(text, type="") {
      statusEl.textContent = text;
      statusEl.className = "pill " + (type === "ok" ? "ok" : type === "err" ? "err" : "");
    }

    function esc(s) {
      return String(s ?? "")
        .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }

    /************ JSONP ************/
    function jsonpCall(params, timeoutMs = 180000) {
      return new Promise((resolve, reject) => {
        const cb = "cb_" + Date.now() + "_" + Math.random().toString(16).slice(2);
        const qs = new URLSearchParams({ ...params, callback: cb }).toString();
        const url = `${APPS_SCRIPT_WEBAPP_URL}?${qs}`;

        const script = document.createElement("script");
        let timer = null;

        window[cb] = (data) => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("Error cargando JSONP (revisa /exec o permisos)."));
        };

        function cleanup() {
          if (timer) clearTimeout(timer);
          try { delete window[cb]; } catch {}
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        timer = setTimeout(() => {
          cleanup();
          reject(new Error("Timeout en API (tardó demasiado)."));
        }, timeoutMs);

        script.src = url;
        document.body.appendChild(script);
      });
    }

    /************ QR clean ************/
    function extractHashqr(raw) {
      if (!raw) return "";
      let s = String(raw).trim();
      s = s.replaceAll(" ", "");
      s = s.replaceAll("¡", "+");
      s = s.replaceAll("¿", "?");
      const lower = s.toLowerCase();
      const i = lower.indexOf("hashqr");
      if (i === -1) return "";
      let tail = s.slice(i + "hashqr".length);
      tail = tail.replace(/^[:?=_-]+/g, "");
      const m = tail.match(/^[A-Za-z0-9+\/=_%-]+/);
      return m ? m[0] : "";
    }

    function buildSunatCleanUrl(raw) {
      const token = extractHashqr(raw);
      if (!token) return "";
      return SUNAT_PREFIX + encodeURIComponent(token);
    }

    /************ Render ************/
    function renderResult(resp) {
      const d = resp?.data || {};
      const viewUrl = resp?.viewUrl || "";
      const downloadUrl = resp?.downloadUrl || "";
      const filename = resp?.filename || "";

      const rows = [
        ["FECHA", d.FECHA],
        ["N_SERIE", d.N_SERIE],
        ["N_DOCUMENTO", d.N_DOCUMENTO],
        ["EMPRESA", d.EMPRESA],
        ["RUC", d.RUC],
        ["DESCRIPCION", d.DESCRIPCION],
        ["OP", d.OP],
        ["UNIDAD_MEDIDA", d.UNIDAD_MEDIDA],
        ["CANTIDAD", d.CANTIDAD],
        ["ARCHIVO", filename],
        ["URL (VISTA - guardada en bd)", viewUrl ? `<a href="${esc(viewUrl)}" target="_blank" rel="noopener">Ver PDF</a><div class="muted small">${esc(viewUrl)}</div>` : ""],
        ["URL (DESCARGA)", downloadUrl ? `<a href="${esc(downloadUrl)}" target="_blank" rel="noopener">Descargar PDF</a><div class="muted small">${esc(downloadUrl)}</div>` : ""],
      ];

      outEl.innerHTML = `
        <table><tbody>
          ${rows.map(([k,v]) => `
            <tr>
              <th>${esc(k)}</th>
              <td>${(k.startsWith("URL") || k==="ARCHIVO")
                ? (v || "")
                : `<pre>${esc(v || "")}</pre>`}
              </td>
            </tr>
          `).join("")}
        </tbody></table>
      `;
    }

    /************ Flow ************/
    async function processUrlFlow(sunatUrl) {
      if (busy) return;

      if (!sunatUrl || !sunatUrl.startsWith(SUNAT_PREFIX)) {
        setStatus("URL no válida SUNAT", "err");
        return;
      }

      busy = true;
      setStatus("Procesando (SUNAT → Drive → bd)…");
      lastUrlEl.textContent = sunatUrl;

      try {
        const resp = await jsonpCall({
          action: "process",
          url: sunatUrl,
          ...(API_KEY ? { key: API_KEY } : {})
        });

        if (!resp || !resp.ok) {
          throw new Error(resp?.error || "Respuesta inválida de API.");
        }

        if (resp.status === "duplicate") {
          setStatus("Duplicado (omitido) ✅", "ok");
          outEl.innerHTML = `<div class="ok">Duplicado (omitido) ✅</div>`;
        } else {
          setStatus("Procesado ✅", "ok");
          renderResult(resp);
        }

        if (navigator.vibrate) navigator.vibrate(50);
      } catch (e) {
        console.error(e);
        setStatus("Error: " + (e?.message || e), "err");
      } finally {
        cooldownUntil = Date.now() + COOLDOWN_MS;
        busy = false;
      }
    }

    function onScanSuccess(decodedText) {
      const now = Date.now();
      if (busy || now < cooldownUntil) return;

      const sunatUrl = buildSunatCleanUrl(decodedText) || decodedText;
      if (!sunatUrl.startsWith(SUNAT_PREFIX)) {
        setStatus("QR leído (no SUNAT)", "ok");
        cooldownUntil = now + COOLDOWN_MS;
        return;
      }

      processUrlFlow(sunatUrl);
    }

    /************ Camera (igual a tu snippet que sí prende) ************/
    async function startScanner() {
      setStatus("Iniciando cámara…");
      if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

      const config = {
        fps: 12,
        qrbox: { width: 260, height: 260 },
        formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ],
        experimentalFeatures: { useBarCodeDetectorIfSupported: true }
      };

      try {
        await html5QrCode.start(
          { facingMode: { exact: "environment" } },
          config,
          onScanSuccess,
          () => {}
        );
        setStatus("Cámara trasera activa", "ok");
      } catch (e) {
        console.error(e);
        try {
          await html5QrCode.start(
            { facingMode: "environment" },
            config,
            onScanSuccess,
            () => {}
          );
          setStatus("Cámara trasera activa", "ok");
        } catch (e2) {
          console.error(e2);
          setStatus("No se pudo iniciar (permiso/app interna)", "err");
        }
      }
    }

    async function stopScanner() {
      if (!html5QrCode) return;
      try {
        await html5QrCode.stop();
        await html5QrCode.clear();
        setStatus("Detenido");
      } catch (e) {
        console.error(e);
        setStatus("No se pudo detener", "err");
      }
    }

    btnStart.addEventListener("click", startScanner);
    btnStop.addEventListener("click", stopScanner);
    btnProcess.addEventListener("click", () => processUrlFlow(urlInput.value.trim()));
  </script>
</body>
</html>
