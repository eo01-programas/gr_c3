<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Extractor Guía de Remisión SUNAT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        h1 { text-align: center; color: #333; font-size: 20px; }
        textarea { width: 100%; height: 150px; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; resize: none; margin-bottom: 10px; }
        button { margin: 20px 0; padding: 15px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .download-btn { display: block; text-align: center; padding: 20px; font-size: 20px; background: #28a745; color: white; text-decoration: none; border-radius: 8px; margin: 20px 0; }
        .download-btn:hover { background: #218838; }
        .info { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .result { flex-grow: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; vertical-align: top; }
        th { background: #f0f0f0; }
        .loading { text-align: center; font-size: 18px; color: #007bff; padding: 40px; }
        .error { color: red; }
        input[type="file"] { font-size: 16px; padding: 10px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
    <h1>Extractor Guía de Remisión SUNAT<br><small>Versión definitiva y robusta</small></h1>
    <p>Escanea el QR → presiona "Procesar" (o Enter).<br>
    <strong>Nuevo:</strong> Limpieza ultra robusta + extracción automática (si el navegador lo permite) o con archivo local.</p>
    
    <textarea id="scanned" placeholder="Texto escaneado aparecerá aquí..." autofocus></textarea>
    
    <button onclick="procesar()">Procesar Guía</button>
    
    <div id="resultado" class="result"></div>

    <script>
        const textarea = document.getElementById('scanned');
        const resultado = document.getElementById('resultado');

        textarea.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                procesar();
            }
        });

        async function procesar() {
            let raw = textarea.value.trim();
            if (!raw) return alert('Escanea o ingresa el código QR.');

            resultado.innerHTML = '<p class="loading">Limpiando y procesando...</p>';

            // Limpieza ultra robusta: busca "hashqr" (incluso mangled) y extrae solo el hash
            let cleaned = raw
                .replace(/Ñ/gi, ':')
                .replace(/--/g, '//')
                .replace(/'/g, '-')
                .replace(/¡/g, '+')
                .replace(/¿/g, '=')
                .replace(/_/g, '?');

            let hashIndex = cleaned.toLowerCase().indexOf('hashqr');
            let hashRaw = '';
            if (hashIndex !== -1) {
                hashRaw = cleaned.substring(hashIndex + 6);
                // Limpia caracteres no válidos del hash
                hashRaw = hashRaw.replace(/[^A-Za-z0-9+\/=]/g, '');
            }

            if (hashRaw.length < 80) {
                resultado.innerHTML = `<div class="info error"><strong>No se encontró el hash correcto.</strong><br>Texto recibido:<pre>${raw}</pre>Edita o reescanea.</div>`;
                return;
            }

            let urlLimpia = 'https://e-factura.sunat.gob.pe/v1/contribuyente/gre/comprobantes/descargaqr?hashqr=' + encodeURIComponent(hashRaw);

            // Intento automático (puede fallar por CORS)
            try {
                resultado.innerHTML = '<p class="loading">Intentando extracción automática...<br>(5-20 segundos)</p>';
                let response = await fetch(urlLimpia);
                if (!response.ok) throw new Error('Error descarga');
                let blob = await response.blob();
                await extraerDeZip(blob, urlLimpia);
            } catch (err) {
                // Fallback: descarga manual + opción subir ZIP local
                mostrarFallback(urlLimpia);
            }

            textarea.value = '';
            textarea.focus();
        }

        function mostrarFallback(urlLimpia) {
            resultado.innerHTML = `
                <div class="info">
                    <h2>¡URL limpiada correctamente!</h2>
                    <p>El navegador bloqueó la lectura automática (restricción de seguridad CORS, común en sitios gubernamentales).</p>
                    <a href="${urlLimpia}" class="download-btn" download="guia-remision.zip">Descargar ZIP ahora</a>
                    <p><strong>Opción 1 (rápida):</strong> Abre el PDF del ZIP → todo está ahí claramente.</p>
                    <p><strong>Opción 2 (extracción aquí):</strong></p>
                    <ol>
                        <li>Descarga el ZIP con el botón verde.</li>
                        <li>Ve a "Descargas" en tu celular y selecciona el archivo aquí:</li>
                    </ol>
                    <input type="file" id="localzip" accept=".zip,application/zip,application/octet-stream">
                    <p>O abre el PDF directamente: nombre empresa arriba, placa en transporte, tabla en el centro.</p>
                </div>
            `;
            document.getElementById('localzip').addEventListener('change', async (e) => {
                let file = e.target.files[0];
                if (file) await extraerDeZip(file, urlLimpia);
            });
        }

        async function extraerDeZip(source, urlLimpia) {
            try {
                resultado.innerHTML = '<p class="loading">Extrayendo datos del XML...</p>';
                let zip = await JSZip.loadAsync(source);
                let xmlFile = Object.keys(zip.files).find(f => f.toLowerCase().endsWith('.xml') && !zip.files[f].dir);
                if (!xmlFile) throw new Error('No hay XML en el ZIP');

                let xmlStr = await zip.file(xmlFile).async('text');
                let parser = new DOMParser();
                let xmlDoc = parser.parseFromString(xmlStr, 'application/xml');

                const ns = p => ({ cac: 'urn:oasis:names:specification:ubl:schema:xsd:CommonAggregateComponents-2',
                                   cbc: 'urn:oasis:names:specification:ubl:schema:xsd:CommonBasicComponents-2' }[p] || null);

                const xpath = (q, ctx = xmlDoc, type = XPathResult.STRING_TYPE) => xmlDoc.evaluate(q, ctx, ns, type, null);

                let empresa = xpath('//cac:DespatchSupplierParty//cac:PartyLegalEntity/cbc:RegistrationName || //cac:DespatchSupplierParty//cac:PartyName/cbc:Name').stringValue.trim();
                let ruc = xpath('//cac:DespatchSupplierParty//cac:PartyIdentification/cbc:ID[@schemeID="6"]').stringValue.trim();

                let modalidadCode = xpath('//cac:ShipmentStage/cbc:TransportModeCode').stringValue.trim();
                let modalidad = modalidadCode === '01' ? 'Privado' : (modalidadCode === '02' ? 'Público' : 'Otro');

                let placa = xpath('//cac:RoadTransport/cbc:LicensePlateID').stringValue.trim().toUpperCase();
                let conductorDni = xpath('//cac:DriverPerson/cbc:ID').stringValue.trim();
                let transportista = xpath('//cac:CarrierParty//cbc:RegistrationName || //cac:CarrierParty//cbc:Name').stringValue.trim();

                let lines = xpath('//cac:DespatchLine', null, XPathResult.ORDERED_NODE_SNAPSHOT_TYPE);
                let tabla = `<table><thead><tr><th>Ítem</th><th>Cantidad</th><th>Unidad</th><th>Descripción detallada</th></tr></thead><tbody>`;
                for (let i = 0; i < lines.snapshotLength; i++) {
                    let line = lines.snapshotItem(i);
                    let item = xpath('cbc:ID', line).stringValue.trim() || (i+1);
                    let cant = xpath('cbc:DeliveredQuantity', line).stringValue.trim();
                    let unidad = xpath('cbc:DeliveredQuantity/@unitCode', line).stringValue.trim();
                    let descs = xpath('cac:Item/cbc:Description', line, XPathResult.ORDERED_NODE_SNAPSHOT_TYPE);
                    let desc = '';
                    for (let j = 0; j < descs.snapshotLength; j++) {
                        if (j > 0) desc += '<br>';
                        desc += descs.snapshotItem(j).textContent.trim();
                    }
                    tabla += `<tr><td>${item}</td><td>${cant}</td><td>${unidad}</td><td>${desc || 'Sin descripción'}</td></tr>`;
                }
                tabla += `</tbody></table>`;
                if (lines.snapshotLength === 0) tabla = '<p>No hay ítems.</p>';

                resultado.innerHTML = `
                    <div class="info">
                        <h2>¡Datos extraídos correctamente!</h2>
                        <p><strong>Empresa remitente:</strong> ${empresa || 'No encontrado'} ${ruc ? `(RUC: ${ruc})` : ''}</p>
                        <p><strong>Modalidad:</strong> ${modalidad}</p>
                        ${modalidadCode === '01' ? `<p><strong>Placa:</strong> ${placa || 'No encontrada'}</p>${conductorDni ? `<p><strong>DNI Conductor:</strong> ${conductorDni}</p>` : ''}` : `<p><strong>Transportista:</strong> ${transportista || 'No encontrado'}</p>`}
                        <h3>Bienes trasladados:</h3>
                        ${tabla}
                        <a href="${urlLimpia}" class="download-btn" download="guia.zip">Descargar ZIP completo</a>
                    </div>
                `;
            } catch (err) {
                resultado.innerHTML = `<div class="info error"><strong>Error al extraer:</strong> ${err.message}<br>Intenta de nuevo o abre el PDF.</div>
                    <a href="${urlLimpia}" class="download-btn">Descargar ZIP</a>`;
            }
        }
    </script>
</body>
</html>
