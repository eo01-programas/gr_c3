<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GRE SUNAT | Escaneo masivo</title>
  <style>
    body { font-family: system-ui, Arial; margin: 16px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin: 12px 0; }
    #reader { width: min(420px, 100%); margin: 0 auto; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    button, input { padding: 10px 12px; border-radius: 10px; border: 1px solid #ddd; background: #fff; }
    button { cursor: pointer; }
    button.primary { border-color: #111; }
    .muted { color: #666; font-size: 13px; }
    .pill { display:inline-block; padding: 4px 8px; border:1px solid #eee; border-radius: 999px; font-size: 12px; }
    .ok { color: #0a7a2f; font-weight: 700; }
    .err { color: #b00020; font-weight: 700; }
    pre { white-space: pre-wrap; word-break: break-word; margin: 8px 0 0; }
    a { word-break: break-word; }
  </style>
</head>
<body>
  <h2>GRE SUNAT | Escaneo masivo</h2>
  <p class="muted">
    Abre en Chrome/Safari (no dentro de WhatsApp/Instagram) y permite cámara.
  </p>

  <div class="card">
    <div class="row">
      <button id="btnStart" class="primary">Iniciar cámara trasera</button>
      <button id="btnStop">Detener</button>
      <span id="status" class="pill">Listo</span>
    </div>

    <div style="height:12px"></div>
    <div id="reader"></div>

    <div style="height:12px"></div>
    <div class="muted">O pega el URL (prueba manual):</div>
    <div class="row">
      <input id="urlInput" style="flex:1; min-width: 240px;"
             placeholder="https://e-factura.sunat.gob.pe/...hashqr=..." />
      <button id="btnProcess">Procesar URL</button>
    </div>

    <div class="muted" style="margin-top:10px;">Último URL (SUNAT):</div>
    <pre id="lastUrl"></pre>

    <div class="muted" style="margin-top:10px;">Último URL (API JSONP):</div>
    <pre id="lastApiUrl"></pre>
  </div>

  <div class="card">
    <b>Respuesta</b>
    <pre id="out" class="muted">Aún no hay datos.</pre>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    /************ CONFIG ************/
    const APPS_SCRIPT_WEBAPP_URL_PRIMARY =
      "https://script.google.com/macros/s/AKfycbyOAmx40taEPCaRMl_UkN9PGgy4diO5UFh9jN4XgzLYXTWJcGyX2el4tg_HFF-QQFi5/execv";

    // Fallback automático: si te pasaron /execv por error, probamos /exec
    const APPS_SCRIPT_WEBAPP_URL_FALLBACK =
      APPS_SCRIPT_WEBAPP_URL_PRIMARY.replace(/\/execv$/i, "/exec");

    const SUNAT_PREFIX =
      "https://e-factura.sunat.gob.pe/v1/contribuyente/gre/comprobantes/descargaqr?hashqr=";

    /************ UI ************/
    const btnStart = document.getElementById("btnStart");
    const btnStop  = document.getElementById("btnStop");
    const btnProcess = document.getElementById("btnProcess");
    const urlInput = document.getElementById("urlInput");

    const statusEl = document.getElementById("status");
    const lastUrlEl = document.getElementById("lastUrl");
    const lastApiUrlEl = document.getElementById("lastApiUrl");
    const outEl = document.getElementById("out");

    let html5QrCode = null;
    let busy = false;
    let cooldownUntil = 0;
    const COOLDOWN_MS = 1200;

    function setStatus(text, type="") {
      statusEl.textContent = text;
      statusEl.className = "pill " + (type === "ok" ? "ok" : type === "err" ? "err" : "");
    }

    /************ QR clean ************/
    function extractHashqr(raw) {
      if (!raw) return "";
      let s = String(raw).trim().replaceAll(" ", "").replaceAll("¡","+").replaceAll("¿","?");
      const i = s.toLowerCase().indexOf("hashqr");
      if (i === -1) return "";
      let tail = s.slice(i + "hashqr".length).replace(/^[:?=_-]+/g, "");
      const m = tail.match(/^[A-Za-z0-9+\/=_%-]+/);
      return m ? m[0] : "";
    }

    function buildSunatCleanUrl(raw) {
      const token = extractHashqr(raw);
      if (!token) return "";
      return SUNAT_PREFIX + encodeURIComponent(token);
    }

    /************ JSONP ************/
    function jsonpCall(baseUrl, params, timeoutMs = 120000) {
      return new Promise((resolve, reject) => {
        const cb = "cb_" + Date.now() + "_" + Math.random().toString(16).slice(2);
        const qs = new URLSearchParams({ ...params, callback: cb }).toString();
        const url = `${baseUrl}?${qs}`;

        lastApiUrlEl.textContent = url;

        const script = document.createElement("script");
        let timer = null;

        window[cb] = (data) => { cleanup(); resolve({ data, url }); };

        script.onerror = () => {
          cleanup();
          reject(new Error("JSONP no cargó: " + url));
        };

        function cleanup() {
          if (timer) clearTimeout(timer);
          try { delete window[cb]; } catch {}
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        timer = setTimeout(() => {
          cleanup();
          reject(new Error("Timeout JSONP: " + url));
        }, timeoutMs);

        script.src = url;
        document.body.appendChild(script);
      });
    }

    async function callApiWithFallback(params) {
      // 1) intenta con PRIMARY
      try {
        return await jsonpCall(APPS_SCRIPT_WEBAPP_URL_PRIMARY, params);
      } catch (e1) {
        // 2) intenta con FALLBACK (/exec)
        return await jsonpCall(APPS_SCRIPT_WEBAPP_URL_FALLBACK, params);
      }
    }

    /************ Flow ************/
    async function processUrlFlow(sunatUrl) {
      if (busy) return;

      if (!sunatUrl || !sunatUrl.startsWith(SUNAT_PREFIX)) {
        setStatus("URL no válida SUNAT", "err");
        return;
      }

      busy = true;
      setStatus("Procesando (SUNAT → Drive → bd)…");
      lastUrlEl.textContent = sunatUrl;
      outEl.textContent = "Procesando…";

      try {
        const respWrap = await callApiWithFallback({ action: "process", url: sunatUrl });
        const resp = respWrap.data;

        outEl.textContent = JSON.stringify(resp, null, 2);

        if (!resp || !resp.ok) {
          setStatus("Error API", "err");
        } else if (resp.status === "duplicate") {
          setStatus("Duplicado (omitido) ✅", "ok");
        } else {
          setStatus("Procesado ✅", "ok");
        }

        if (navigator.vibrate) navigator.vibrate(50);
      } catch (e) {
        setStatus("Error JSONP", "err");
        outEl.textContent = (e && e.message) ? e.message : String(e);
      } finally {
        cooldownUntil = Date.now() + COOLDOWN_MS;
        busy = false;
      }
    }

    function onScanSuccess(decodedText) {
      const now = Date.now();
      if (busy || now < cooldownUntil) return;

      const clean = buildSunatCleanUrl(decodedText) || decodedText;

      if (!clean.startsWith(SUNAT_PREFIX)) {
        setStatus("QR leído (no SUNAT)", "ok");
        cooldownUntil = now + COOLDOWN_MS;
        return;
      }

      processUrlFlow(clean);
    }

    /************ Camera (trasera + solo QR) ************/
    async function startScanner() {
      setStatus("Iniciando cámara…");
      if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

      const config = {
        fps: 12,
        qrbox: { width: 260, height: 260 },
        formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ],
        experimentalFeatures: { useBarCodeDetectorIfSupported: true }
      };

      try {
        await html5QrCode.start(
          { facingMode: { exact: "environment" } },
          config,
          onScanSuccess,
          () => {}
        );
        setStatus("Cámara trasera activa", "ok");
      } catch (e) {
        try {
          await html5QrCode.start(
            { facingMode: "environment" },
            config,
            onScanSuccess,
            () => {}
          );
          setStatus("Cámara trasera activa", "ok");
        } catch (e2) {
          setStatus("No se pudo iniciar cámara", "err");
          outEl.textContent = String(e2);
        }
      }
    }

    async function stopScanner() {
      if (!html5QrCode) return;
      try {
        await html5QrCode.stop();
        await html5QrCode.clear();
        setStatus("Detenido");
      } catch (e) {
        setStatus("No se pudo detener", "err");
      }
    }

    btnStart.addEventListener("click", startScanner);
    btnStop.addEventListener("click", stopScanner);
    btnProcess.addEventListener("click", () => processUrlFlow(urlInput.value.trim()));

    // Ping automático para validar API al abrir la página
    (async () => {
      try {
        const r = await callApiWithFallback({ action: "ping" });
        if (r?.data?.ok) setStatus("API OK ✅", "ok");
      } catch (e) {
        setStatus("API NO responde", "err");
        outEl.textContent = (e && e.message) ? e.message : String(e);
      }
    })();
  </script>
</body>
</html>
