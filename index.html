<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GRE SUNAT | Escaneo masivo</title>
    <style>
        body {
            font-family: system-ui, Arial;
            margin: 16px;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 12px;
            margin: 12px 0;
        }

        #reader {
            width: min(420px, 100%);
            margin: 0 auto;
        }

        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        button,
        input {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: #fff;
        }

        button {
            cursor: pointer;
        }

        button.primary {
            border-color: #111;
        }

        .muted {
            color: #666;
            font-size: 13px;
        }

        .pill {
            display: inline-block;
            padding: 4px 8px;
            border: 1px solid #eee;
            border-radius: 999px;
            font-size: 12px;
        }

        .ok {
            color: #0a7a2f;
            font-weight: 700;
        }

        .err {
            color: #b00020;
            font-weight: 700;
        }

        pre {
            white-space: pre-wrap;
            word-break: break-word;
            margin: 8px 0 0;
        }
    </style>
</head>

<body>
    <h2>GRE SUNAT | Escaneo masivo</h2>

    <div class="card">
        <div class="row">
            <button id="btnStart" class="primary">Iniciar cámara trasera</button>
            <button id="btnStop">Detener</button>
            <span id="status" class="pill">Listo</span>
        </div>

        <div style="height:12px"></div>
        <div id="reader"></div>

        <div style="height:12px"></div>
        <div class="muted">O pega el URL:</div>
        <div class="row">
            <input id="urlInput" style="flex:1; min-width: 240px;"
                placeholder="https://e-factura.sunat.gob.pe/...hashqr=..." />
            <button id="btnProcess">Procesar URL</button>
        </div>

        <div class="muted" style="margin-top:10px;">Último URL:</div>
        <pre id="lastUrl"></pre>
    </div>

    <div class="card">
        <b>Respuesta</b>
        <pre id="out" class="muted">Aún no hay datos.</pre>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        const APPS_SCRIPT_WEBAPP_URL =
            "https://script.google.com/macros/s/AKfycbxiz6S9Dsqfd0s1ttQawHY5QqiXkbKqoCETqUpz5iNeYM27Xh7huVhqEG3mMQAkeIPw/exec";

        const SUNAT_PREFIX =
            "https://e-factura.sunat.gob.pe/v1/contribuyente/gre/comprobantes/descargaqr?hashqr=";

        const btnStart = document.getElementById("btnStart");
        const btnStop = document.getElementById("btnStop");
        const btnProcess = document.getElementById("btnProcess");
        const urlInput = document.getElementById("urlInput");
        const statusEl = document.getElementById("status");
        const lastUrlEl = document.getElementById("lastUrl");
        const outEl = document.getElementById("out");

        let html5QrCode = null;
        let busy = false;

        function setStatus(text, type = "") {
            statusEl.textContent = text;
            statusEl.className = "pill " + (type === "ok" ? "ok" : type === "err" ? "err" : "");
        }

        function extractHashqr(raw) {
            if (!raw) return "";
            let s = String(raw).trim().replaceAll(" ", "").replaceAll("¡", "+").replaceAll("¿", "?");
            const i = s.toLowerCase().indexOf("hashqr");
            if (i === -1) return "";
            let tail = s.slice(i + "hashqr".length).replace(/^[:?=_-]+/g, "");
            const m = tail.match(/^[A-Za-z0-9+\/=_%-]+/);
            return m ? m[0] : "";
        }

        function buildSunatCleanUrl(raw) {
            const token = extractHashqr(raw);
            if (!token) return "";
            return SUNAT_PREFIX + encodeURIComponent(token);
        }

        function jsonpCall(params, timeoutMs = 120000) {
            return new Promise((resolve, reject) => {
                const cb = "cb_" + Date.now() + "_" + Math.random().toString(16).slice(2);
                const qs = new URLSearchParams({ ...params, callback: cb }).toString();
                const url = `${APPS_SCRIPT_WEBAPP_URL}?${qs}`;

                const script = document.createElement("script");
                let timer = null;

                window[cb] = (data) => { cleanup(); resolve(data); };

                script.onerror = () => {
                    cleanup();
                    reject(new Error("JSONP no cargó. URL: " + url));
                };

                function cleanup() {
                    if (timer) clearTimeout(timer);
                    try { delete window[cb]; } catch { }
                    if (script.parentNode) script.parentNode.removeChild(script);
                }

                timer = setTimeout(() => {
                    cleanup();
                    reject(new Error("Timeout en API. URL: " + url));
                }, timeoutMs);

                script.src = url;
                document.body.appendChild(script);
            });
        }

        async function processUrlFlow(sunatUrl) {
            if (busy) return;
            if (!sunatUrl.startsWith(SUNAT_PREFIX)) {
                setStatus("URL no válida SUNAT", "err");
                return;
            }

            busy = true;
            setStatus("Procesando completo...");
            lastUrlEl.textContent = sunatUrl;

            try {
                const resp = await jsonpCall({ action: "process", url: sunatUrl });
                if (resp?.ok) {
                    setStatus("Guardado ✅", "ok");

                    const d = resp.data || {};
                    // Tabla detallada
                    outEl.innerHTML = `
                        <table style="width:100%; border-collapse:collapse; margin-top:10px; font-size:13px;">
                            <tr style="background:#f0f0f0;"><th colspan="2" style="padding:6px; border:1px solid #ddd;">DATOS EXTRAÍDOS</th></tr>
                            <tr><th style="text-align:left; border:1px solid #ddd; padding:4px;">N° GUÍA</th><td style="border:1px solid #ddd; padding:4px;"><b>${d.N_SERIE || ""}-${d.N_DOCUMENTO || ""}</b></td></tr>
                            <tr><th style="text-align:left; border:1px solid #ddd; padding:4px;">FECHA</th><td style="border:1px solid #ddd; padding:4px;">${d.FECHA || ""}</td></tr>
                            <tr><th style="text-align:left; border:1px solid #ddd; padding:4px;">RUC</th><td style="border:1px solid #ddd; padding:4px;">${d.RUC || ""}</td></tr>
                            <tr><th style="text-align:left; border:1px solid #ddd; padding:4px;">EMPRESA</th><td style="border:1px solid #ddd; padding:4px;">${d.EMPRESA || ""}</td></tr>
                            <tr><th style="text-align:left; border:1px solid #ddd; padding:4px;">DESCRIP.</th><td style="border:1px solid #ddd; padding:4px;">${d.DESCRIPCION || ""}</td></tr>
                            <tr><th style="text-align:left; border:1px solid #ddd; padding:4px;">CANTIDAD</th><td style="border:1px solid #ddd; padding:4px;">${d.CANTIDAD || ""} ${d.UNIDAD_MEDIDA || ""}</td></tr>
                            <tr><th style="text-align:left; border:1px solid #ddd; padding:4px;">OP</th><td style="border:1px solid #ddd; padding:4px;">${d.OP || ""}</td></tr>
                            <tr style="background:#f9f9f9;">
                                <th style="text-align:left; border:1px solid #ddd; padding:4px;">PDF</th>
                                <td style="border:1px solid #ddd; padding:4px;"><a href="${resp.fileUrl}" target="_blank">Ver PDF</a></td>
                            </tr>
                        </table>

                        <details style="margin-top:10px; border:1px solid #eee; padding:8px; border-radius:6px;">
                            <summary style="cursor:pointer; font-weight:bold; color:#555;">Ver Texto Completo (Raw)</summary>
                            <pre style="white-space:pre-wrap; font-size:11px; color:#333; margin-top:5px;">${resp.fullText || "Sin texto"}</pre>
                        </details>
                    `;
                } else {
                    setStatus("Error API", "err");
                    outEl.textContent = JSON.stringify(resp, null, 2);
                }
            } catch (e) {
                setStatus("Error JSONP", "err");
                outEl.textContent = (e && e.message) ? e.message : String(e);
            } finally {
                busy = false;
            }
        }

        function onScanSuccess(decodedText) {
            const clean = buildSunatCleanUrl(decodedText) || decodedText;
            if (clean.startsWith(SUNAT_PREFIX)) processUrlFlow(clean);
            else setStatus("QR leído (no SUNAT)", "ok");
        }

        async function startScanner() {
            setStatus("Iniciando cámara…");
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

            const config = {
                fps: 12,
                qrbox: { width: 260, height: 260 },
                formatsToSupport: [Html5QrcodeSupportedFormats.QR_CODE],
                experimentalFeatures: { useBarCodeDetectorIfSupported: true }
            };

            try {
                await html5QrCode.start(
                    { facingMode: { exact: "environment" } },
                    config,
                    onScanSuccess,
                    () => { }
                );
                setStatus("Cámara trasera activa", "ok");
            } catch (e) {
                try {
                    await html5QrCode.start(
                        { facingMode: "environment" },
                        config,
                        onScanSuccess,
                        () => { }
                    );
                    setStatus("Cámara trasera activa", "ok");
                } catch (e2) {
                    setStatus("No se pudo iniciar cámara", "err");
                    outEl.textContent = String(e2);
                }
            }
        }

        async function stopScanner() {
            if (!html5QrCode) return;
            try {
                await html5QrCode.stop();
                await html5QrCode.clear();
                setStatus("Detenido");
            } catch (e) {
                setStatus("No se pudo detener", "err");
            }
        }

        btnStart.addEventListener("click", startScanner);
        btnStop.addEventListener("click", stopScanner);
        btnProcess.addEventListener("click", () => processUrlFlow(urlInput.value.trim()));

        // test rápido de ping
        (async () => {
            try {
                const r = await jsonpCall({ action: "ping" }, 20000);
                if (r?.ok) setStatus("API OK ✅", "ok");
            } catch { }
        })();
    </script>
</body>

</html>
